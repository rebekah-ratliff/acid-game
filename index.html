<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rave Maze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Koulen&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0C0C0E;
            --maze-neon: #1B00FF;
            --maze-dark: #0A0094;
            --ui-bg: #111115;
            --ui-panel: #1A1A20;
            --text-main: #E0E0E0;
            --msg-player: #2C2C3A;
            --msg-smumsky: #1B00FF;
            --msg-dee: #9D00FF;
            --msg-gaz: #00A6FF;
            --beat-scale: 1;
            --chromatic-offset: 0px;
            --trip-color: #ffffff;
            --trip-rotate: 0deg;
            --trip-blur: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Main App Container */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }

        #game-section {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* Full Bleed Container */
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            box-shadow: 0 0 50px rgba(10, 0, 148, 0.2) inset;
            transform-origin: center center;
            transition: transform 0.05s linear;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            
            /* Beat reaction effects applied here to isolate from UI */
            transform: scale(var(--beat-scale)) rotate(var(--trip-rotate));
            filter: drop-shadow(var(--chromatic-offset) 0 0 rgba(255, 0, 0, 0.5)) 
                    drop-shadow(calc(var(--chromatic-offset) * -1) 0 0 rgba(0, 255, 255, 0.5))
                    blur(var(--trip-blur));
            transition: transform 0.05s ease-out, filter 0.05s ease-out;
        }

        /* UI Overlays (Now truly full-screen over the entire body) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(12, 12, 14, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        /* Custom Splash Screen Styling */
        #start-screen {
            position: fixed;
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Image-based Start Button */
        #btn-start {
            background: none;
            border: none;
            box-shadow: none;
            padding: 0;
            cursor: pointer;
            position: absolute;
            bottom: 22%;
            right: 18%;
            transition: transform 0.2s ease;
        }

        #btn-start:hover {
            background: none;
            box-shadow: none;
            border: none;
            transform: scale(1.05); /* Slight scale on hover for feedback */
        }

        #start-btn-img {
            width: 260px;
            height: auto;
            display: block;
        }

        h1, h2, .koulen {
            font-family: 'Koulen', cursive;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 4rem;
            color: var(--maze-neon);
            text-shadow: 0 0 20px var(--maze-dark);
            margin-bottom: 1rem;
        }

        .hidden {
            display: none !important;
        }

        button {
            background: transparent;
            border: 2px solid var(--maze-neon);
            color: var(--maze-neon);
            font-family: 'Koulen', cursive;
            font-size: 1.5rem;
            padding: 0.5rem 2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(27, 0, 255, 0.2), inset 0 0 10px rgba(27, 0, 255, 0.2);
        }

        button:hover {
            background: var(--maze-neon);
            color: #fff;
            box-shadow: 0 0 20px rgba(27, 0, 255, 0.6), inset 0 0 20px rgba(27, 0, 255, 0.6);
        }

        /* Global Mute Button */
        #btn-mute {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10000;

            padding: 4px 10px;

            background: #9fb7ff;
            color: #050816;

            border-left: 3px solid #5366a8;
            border-right: 3px solid #1d2448;
            border-top: 2px solid #5366a8;
            border-bottom: 2px solid #1d2448;

            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 700;

            cursor: pointer;
            box-shadow: none;

            image-rendering: pixelated;
        }

        #btn-mute::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;

            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(5, 8, 22, 0.12) 0px,
                    rgba(5, 8, 22, 0.12) 1px,
                    transparent 1px,
                    transparent 4px
                );

            opacity: 0.35;
        }

        #btn-mute:active {
            transform: translateY(1px);
            border-top: 2px solid #1d2448;
            border-bottom: 2px solid #5366a8;
        }

        #btn-mute:hover {
            background: #8aa6ff;
            color: #050816;
            box-shadow: none;
        }

        #white-flash {
            position: fixed;
            inset: 0;
            background: #dce8ff;
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
        }

        /* Retro Phone UI Panel */
        #phone-ui {
            width: 360px;
            min-width: 360px;
            background: #08080c;
            border-left: 3px solid #050508;
            display: flex;
            flex-direction: column;
            z-index: 5;
            position: relative;
            font-family: 'JetBrains Mono', monospace;
            color: #050816;
            padding: 14px;
            box-shadow: inset 0 0 40px rgba(27, 0, 255, 0.16);
        }

        /* Common Nokia LCD block styles */
        #phone-chrome,
        #phone-header,
        #messages-container,
        #phone-softkeys {
            background: #9fb7ff;
            color: #050816;
            border-left: 3px solid #5366a8;
            border-right: 3px solid #1d2448;
        }

        /* LCD Texture overlay */
        #phone-ui::after {
            content: "";
            position: absolute;
            inset: 14px;
            pointer-events: none;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(5, 8, 22, 0.10) 0px,
                    rgba(5, 8, 22, 0.10) 1px,
                    transparent 1px,
                    transparent 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(5, 8, 22, 0.05) 0px,
                    rgba(5, 8, 22, 0.05) 1px,
                    transparent 1px,
                    transparent 4px
                );
            opacity: 0.55;
            mix-blend-mode: multiply;
            z-index: 20;
        }

        /* Retro Phone Chrome */
        #phone-chrome {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 3px solid #5366a8;
            border-bottom: none;
            padding: 0.45rem 0.55rem 0.2rem;
            font-size: 0.62rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: none;
        }

        .phone-chrome-item,
        #now-playing-text,
        #battery-text {
            color: #050816;
            font-weight: 700;
        }

        .phone-chrome-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .now-playing {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
            transition: all 0.1s;
        }

        /* LCD Glitch Class */
        .glitch-ui {
            transform: translateX(1px);
            opacity: 0.85;
            filter: contrast(1.5);
        }

        #phone-header {
            border-top: none;
            border-bottom: 2px solid #1d2448;
            padding: 0.25rem 0.55rem 0.45rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-shadow: none;
            z-index: 2;
        }

        #contact-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.76rem;
            color: #050816;
            margin: 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 700;
        }

        #messages-container {
            flex-grow: 1;
            border-top: none;
            border-bottom: 3px solid #1d2448;
            padding: 0.65rem 0.55rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        #messages-container::-webkit-scrollbar { width: 4px; }
        #messages-container::-webkit-scrollbar-track { background: transparent; }
        #messages-container::-webkit-scrollbar-thumb { background: #263326; border-radius: 0; }

        /* Rigid SMS Log Messages */
        .msg {
            max-width: 100%;
            margin-top: 2px;
            padding: 0.15rem 0;
            border-radius: 0;
            font-size: 0.78rem;
            line-height: 1.25;
            word-wrap: break-word;
            animation: popIn 0.12s steps(2, end);
            position: relative;
            background: none !important;
            box-shadow: none !important;
            font-weight: 700;
            align-self: stretch;
        }

        .msg + .msg {
            margin-top: 2px;
        }

        /* Add extra space when speaker changes */
        .msg.smumsky + .msg.player,
        .msg.player + .msg.smumsky,
        .msg.dee + .msg.player,
        .msg.gaz + .msg.player,
        .msg.player + .msg.dee,
        .msg.player + .msg.gaz {
            margin-top: 8px;
        }

        /* Subtle message grouping for consecutive messages */
        .msg.smumsky + .msg.smumsky,
        .msg.player + .msg.player,
        .msg.dee + .msg.dee,
        .msg.gaz + .msg.gaz {
            opacity: 0.9;
        }

        /* Distinct speaker colors */
        .msg.smumsky { color: #050816; }
        .msg.player { color: #1B00FF; text-align: left; }
        .msg.dee { color: #6a4cff; }
        .msg.gaz { color: #007acc; }

        /* Prefix Labels */
        .msg::before {
            display: inline-block;
            width: 42px;
            opacity: 0.7;
            margin-right: 0.35rem;
            color: #0A0094;
            font-weight: 700;
            font-size: inherit;
        }

        .msg.smumsky::before { content: "SMU:"; }
        .msg.player::before { content: "DIZ:"; }
        .msg.dee::before { content: "DEE:"; }
        .msg.gaz::before { content: "GAZ:"; }

        /* Blinking Cursor */
        .msg:last-child::after {
            content: " ▌";
            animation: blink 1s infinite;
        }

        #phone-softkeys {
            border-bottom: 3px solid #1d2448;
            padding: 0.35rem 0.55rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translateY(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #intro-overlay {
            background: rgba(12, 12, 14, 0.55);
            backdrop-filter: blur(4px);
            transition: opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            color: #cccccc;
            text-align: center;
            
            opacity: 0;
            transform: translateY(6px);
            animation: introFadeIn 0.4s ease forwards;
        }

        @keyframes introFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Win Screen Styles */
        #win-screen {
            background: #0C0C0E;
            padding: 0;
        }

        .ending-gif {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.6;
        }

        #win-content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #win-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            line-height: 1.25;
            letter-spacing: 0.04em;
            font-weight: 700;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: #d7ead1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 1s ease;
        }

        #btn-replay {
            background: #050816;
            color: #9fb7ff;
            border: 2px solid #050816;
            box-shadow: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.45rem 1rem;
            letter-spacing: 0.06em;
            position: relative;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #btn-replay:hover {
            background: #1B00FF;
            color: #ffffff;
            border-color: #1B00FF;
        }

        @media (max-width: 800px) {
            #app-container {
                flex-direction: column;
            }
            #phone-ui {
                width: 100%;
                min-width: 100%;
                height: 35vh;
                border-left: none;
                border-top: 3px solid #050805;
            }
        }
    </style>
</head>
<body>

<!-- Global Overlays outside of the hidden app container -->
<button id="btn-mute" class="hidden">SOUND ON</button>
<div id="white-flash" class="hidden"></div>

<div id="start-screen" class="overlay">
    <button id="btn-start">
        <img id="start-btn-img" />
    </button>
</div>

<div id="intro-overlay" class="overlay hidden">
    <div id="intro-text">
        use arrow keys. find the rave.
    </div>
</div>

<div id="win-screen" class="overlay hidden">
    <img id="win-gif" class="ending-gif" />
    <div id="win-content-container">
        <div id="win-title">ain't nothin' wrong with that</div>
        <button id="btn-replay">GO AGAIN</button>
    </div>
</div>

<!-- Main App Container -->
<div id="app-container">
    <div id="game-section">
        <div id="canvas-container">
            <canvas id="game"></canvas>
        </div>
    </div>

    <!-- Retro Phone UI -->
    <div id="phone-ui">
        <div id="phone-chrome">
            <div class="phone-chrome-item now-playing" id="now-playing-container">
                <span id="now-playing-text">SIGNAL ███░</span>
            </div>
            <div class="phone-chrome-item">
                BAT <span id="battery-text">84%</span>
            </div>
        </div>

        <div id="phone-header">
            <div id="contact-name">SMS: SMUMSKY</div>
        </div>
        <div id="messages-container"></div>
        <div id="phone-softkeys">
            <span>Options</span>
            <span>Clear</span>
        </div>
    </div>
</div>

<script>
/**
 * RAVE MAZE - Main Game Logic
 */
(async function GameApp() {
    
    // ==========================================
    // 1. CONFIGURATION & CONSTANTS
    // ==========================================
    const CONFIG = {
        audioBPM: 128,
        targetTabs: 6,
        totalTabsToSpawn: 10,
        minTabDistance: 350, // Minimum world distance between spawned tabs
        mapScale: 0.45,
        playerDrawSize: 72,
        doctorDrawSize: 88,
        tabDrawSize: 28,
        debugCollision: false, // Set to true to verify mask alignment
        colors: {
            bg: '#0C0C0E',
            tab: '#FFEB3B',
            ravePulsar: '#FF00FF'
        },
        tripStates: [
            { text: "sound", color: "#ffffff", aura: "rgba(255,255,255,0)" },
            { text: "coming up", color: "#a8ffb2", aura: "rgba(168,255,178,0.2)" },
            { text: "buzzing", color: "#ffff66", aura: "rgba(255,255,102,0.3)" },
            { text: "twisted", color: "#ff9933", aura: "rgba(255,153,51,0.4)" },
            { text: "fully sideways", color: "#ff3399", aura: "rgba(255,51,153,0.5)" },
            { text: "face melting", color: "#cc00ff", aura: "rgba(204,0,255,0.6)" },
            { text: "cosmically lost", color: "#00ffff", aura: "rgba(0,255,255,0.8)" }
        ]
    };

    // ==========================================
    // 2. STATE MANAGEMENT
    // ==========================================
    const state = {
        mapWidth: 2000,
        mapHeight: 2000,
        collisionWidth: 2000,
        collisionHeight: 2000,
        collisionImageData: null,
        zoom: 1.05, // Scaled up 5%
        playerSpeed: 6, // Smooth movement speed
        isRunning: false,
        isEnteringRave: false,
        raveEnterTimer: 0,
        raveZoomTimer: 0,
        isEnding: false,
        endingTimer: 0,
        endingPhase: "none",
        lastGifElement: null,
        entryFlash: {
            active: false,
            timer: 0
        },
        tabsCollected: 0,
        tripLevel: 0,
        currentStory: null,
        camera: { x: 0, y: 0 },
        entities: {
            tabs: [],
            rave: null,
            doctor: null // {x, y, encountered, punchTimer}
        },
        player: {
            x: 0, y: 0,
            direction: 'down',
            isMoving: false
        },
        input: {
            up: false, down: false, left: false, right: false
        },
        audio: {
            context: null, element: null, beatPhase: 0,
            lastBeatIndex: -1, lastHalfBeatIndex: -1,
            currentBeatCount: 0, isNewBeat: false, isNewHalfBeat: false,
            isPlaying: false, isMuted: false
        },
        tripDistortion: {
            active: false, timer: 0, maxTime: 0,
            targetAngle: 0, targetBlur: 0, currentAngle: 0, currentBlur: 0
        },
        playerGlitch: {
            active: false, timer: 0, offsetX: 0, offsetY: 0, rgbSplit: false
        },
        playerHit: {
            active: false, timer: 0
        },
        behavior: {
            lastTabTime: Date.now(), lastMessageTime: Date.now(),
            directionChanges: 0, lastDirection: 'down', visitedTiles: [], checkTimer: 0
        },
        uiGlitch: {
            batteryActive: false, textActive: false
        },
        encountersUsed: []
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvas-container');
    const startScreen = document.getElementById('start-screen');
    const winScreen = document.getElementById('win-screen');
    const msgContainer = document.getElementById('messages-container');
    const btnMute = document.getElementById('btn-mute');

    const assets = {
        mapImg: null,
        collisionImg: null,
        homescreenImg: null,
        startBtnImg: null,
        dizzyDance: null,
        sprStand: null, sprWalkDown: null, sprWalkUp: null, sprWalkSide1: null, sprWalkSide2: null,
        sprDocIdle: null, sprDocPunch: null,
        trackAudioUrl: null, logoUrl: null, tabImg: null 
    };

    // ==========================================
    // 3. ASSET LOADER (Robust Path Resolution)
    // ==========================================
    async function loadAssets() {
        console.log("Loading assets...");

        const tryPaths = async (paths, loaderFn, typeName) => {
            for (let path of paths) {
                try {
                    const result = await loaderFn(path);
                    return result;
                } catch (e) {
                    console.warn(`[WARN] Failed to load ${typeName} from: ${path}`);
                }
            }
            console.error(`[ERROR] All paths failed for ${typeName}`);
            return null;
        };

        const loadImageFromURL = (url) => new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error('Image load failed'));
            img.src = url;
        });

        // 1. Load Original Assorted Resources
        assets.trackAudioUrl = await tryPaths(
            ['https://raw.githubusercontent.com/rebekah-ratliff/acid-game/main/track.wav'],
            async (path) => { const r = await fetch(path, { method: 'HEAD' }); if (!r.ok) throw new Error('Audio FAIL'); return path; },
            "Music Track"
        );
        assets.tabImg = await tryPaths(
            ['https://raw.githubusercontent.com/rebekah-ratliff/acid-game/main/tab.png', './tab.png'],
            loadImageFromURL, "Tab Sprite"
        );

        // 2. Load Visual Assets
        const BASE_URL = 'https://raw.githubusercontent.com/rebekah-ratliff/acid-game/main/';
        const loadSilent = async (url) => { try { return await loadImageFromURL(url); } catch(e){ return null; } };

        // Support multiple homescreen variants for robustness
        assets.homescreenImg = await tryPaths(
            [
                BASE_URL + 'homescreen.png',
                BASE_URL + 'homescreen.jpg',
                BASE_URL + 'homescreen.jpeg',
                BASE_URL + 'homescreen.webp',
                BASE_URL + 'HomeScreen.png',
                BASE_URL + 'HOMESCREEN.png'
            ],
            loadImageFromURL,
            "Homescreen Image"
        );

        assets.startBtnImg = await tryPaths(
            [
                BASE_URL + 'STARTDASH.png',
                BASE_URL + 'STARTDASH.PNG'
            ],
            loadImageFromURL,
            "Start Button Image"
        );
        
        assets.dizzyDance = await tryPaths(
            [
                BASE_URL + 'DIZZY_DANCE.gif',
                BASE_URL + 'DIZZY_DANCE.GIF',
                BASE_URL + 'dizzy_dance.gif'
            ],
            loadImageFromURL,
            "Dizzy Dance GIF"
        );
        
        assets.mapImg = await tryPaths(
            [
                BASE_URL + 'map_upres_2.jpg',
                BASE_URL + 'map_upres_2.JPG',
                BASE_URL + 'MAP_UPRES_2.jpg',
                BASE_URL + 'MAP_UPRES_2.JPG',
                BASE_URL + 'MAP_UPRES.JPG',
                BASE_URL + 'MAP.jpeg'
            ],
            loadImageFromURL,
            "Map Image"
        );

        if (assets.mapImg) {
            console.log("Map loaded:", assets.mapImg.src, assets.mapImg.width, assets.mapImg.height);
        } else {
            console.error("Map failed to load. Check exact GitHub filename and capitalization.");
        }

        assets.collisionImg = await loadSilent(BASE_URL + 'MAP_COLLISION.png');
        assets.sprStand = await loadSilent(BASE_URL + 'STAND.png');
        assets.sprWalkDown = await loadSilent(BASE_URL + 'WALK_DOWN.png');
        assets.sprWalkUp = await loadSilent(BASE_URL + 'WALK_UP.png');
        assets.sprWalkSide1 = await loadSilent(BASE_URL + 'WALK_SIDE_1.png');
        assets.sprWalkSide2 = await loadSilent(BASE_URL + 'WALK_SIDE_2.png');
        assets.sprDocIdle = await loadSilent(BASE_URL + 'DOCTOR_IDLE.png');
        assets.sprDocPunch = await loadSilent(BASE_URL + 'DOCTOR_PUNCH.png');

        if (assets.mapImg && assets.collisionImg) {
            state.mapWidth = assets.mapImg.width * CONFIG.mapScale;
            state.mapHeight = assets.mapImg.height * CONFIG.mapScale;

            state.collisionWidth = assets.collisionImg.width;
            state.collisionHeight = assets.collisionImg.height;

            // Extract unscaled collision Map Data
            const offCanvas = document.createElement('canvas');
            offCanvas.width = state.collisionWidth;
            offCanvas.height = state.collisionHeight;
            const octx = offCanvas.getContext('2d');
            octx.drawImage(assets.collisionImg, 0, 0);
            try {
                state.collisionImageData = octx.getImageData(0, 0, state.collisionWidth, state.collisionHeight).data;
            } catch(e) {
                console.error("CORS issue extracting map collision data.", e);
                state.collisionImageData = null;
            }
        }
    }

    // ==========================================
    // 4. AUDIO & BEAT SYSTEM
    // ==========================================
    function initAudio() {
        if (!assets.trackAudioUrl) return;

        if (state.audio.element) {
            state.audio.element.pause();
            state.audio.element.currentTime = 0;
        } else {
            state.audio.element = new Audio(assets.trackAudioUrl);
            state.audio.element.loop = true;
            state.audio.element.volume = 0.6;
            state.audio.element.muted = state.audio.isMuted;
        }
        
        state.audio.lastBeatIndex = -1;
        state.audio.lastHalfBeatIndex = -1;
        state.audio.currentBeatCount = 0;
        state.audio.element.play().then(() => { state.audio.isPlaying = true; }).catch(e => console.error("Audio playback blocked:", e));
    }

    function updateBeatSync() {
        state.audio.isNewBeat = false;
        state.audio.isNewHalfBeat = false;

        if (!state.audio.isPlaying || !state.audio.element) {
            state.audio.beatPhase = 0; return;
        }
        
        const time = state.audio.element.currentTime;
        const beatDuration = 60 / CONFIG.audioBPM; 
        
        state.audio.beatPhase = (time % beatDuration) / beatDuration;

        const beatIndex = Math.floor(time / beatDuration);
        const halfBeatIndex = Math.floor(time / (beatDuration / 2));

        if (beatIndex > state.audio.lastBeatIndex) {
            state.audio.isNewBeat = true;
            state.audio.lastBeatIndex = beatIndex;
        }
        if (halfBeatIndex > state.audio.lastHalfBeatIndex) {
            state.audio.isNewHalfBeat = true;
            state.audio.lastHalfBeatIndex = halfBeatIndex;
        }
        state.audio.currentBeatCount = beatIndex;

        const intensity = state.tripLevel / (CONFIG.tripStates.length - 1); 
        if (intensity > 0) {
            const pulse = Math.max(0, 1 - (state.audio.beatPhase * 4)); 
            const scale = 1.0 + (0.02 * pulse * intensity);
            const chroma = pulse * 4 * intensity; 
            
            canvas.style.setProperty('--beat-scale', scale);
            canvas.style.setProperty('--chromatic-offset', `${chroma}px`);
        } else {
            canvas.style.setProperty('--beat-scale', 1);
            canvas.style.setProperty('--chromatic-offset', `0px`);
        }
    }

    function applyTypingDegradation(text, level) {
        if (level <= 1) return text;

        // LEVEL 2–3: light shorthand
        if (level <= 3) {
            return text
                .replace(/\byou\b/gi, "u")
                .replace(/\bare\b/gi, "r")
                .replace(/\byour\b/gi, "ur");
        }

        // LEVEL 4–5: slight looseness (still readable)
        if (level <= 5) {
            return text
                .replace(/\bgoing\b/gi, "goin")
                .replace(/\bwith\b/gi, "w/")
                .replace(/\bto\b/gi, "2");
        }

        // LEVEL 6+: subtle vibe shift, NOT broken text
        if (level >= 6) {
            // occasional repeated thought
            if (Math.random() < 0.2) {
                const words = text.split(" ");
                const short = words.slice(0, 3).join(" ");
                return text + "..." + short;
            }

            // occasional trailing thought
            if (Math.random() < 0.3) {
                return text + "... wait";
            }

            return text;
        }

        return text;
    }

    function addMessage(sender, text, options = null) {
        if (sender === 'player' && text) {
            text = applyTypingDegradation(text, state.tripLevel);
        }
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        
        if (text) {
            div.innerText = text;
        }
        
        let img = null;
        if (options && options.type === 'gif') {
            img = document.createElement('img');
            img.classList.add("chat-gif");
            img.src = options.src;
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.display = 'block';
            img.style.marginTop = text ? '4px' : '0';
            img.style.border = '2px solid #1d2448';
            div.appendChild(img);
        }

        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;

        if (options && options.type === 'gif' && img) {
            state.lastGifElement = img;
        }
    }

    function triggerStoryBeat() {
        let beat;
        if (state.tabsCollected <= CONFIG.targetTabs) {
            const beatIndex = Math.min(state.tabsCollected - 1, state.currentStory.preRave.length - 1);
            beat = state.currentStory.preRave[beatIndex];
        } else {
            const beatIndex = Math.min(state.tabsCollected - CONFIG.targetTabs - 1, state.currentStory.postRave.length - 1);
            beat = state.currentStory.postRave[beatIndex];
        }

        if (!beat) return;
        addMessage('player', beat.p);
        
        let delay = state.tripLevel > 3 ? (400 + Math.random() * 1400) : (800 + Math.random() * 1000);
        setTimeout(() => {
            if(state.isRunning) { addMessage('smumsky', beat.s); state.behavior.lastMessageTime = Date.now(); }
        }, delay);

        // Side Encounters
        const encounters = state.currentStory.encounters || [];
        let encounter = null;
        const midCount = Math.floor(CONFIG.targetTabs / 2);
        if (state.tabsCollected === midCount) {
            encounter = encounters.find(e => e.trigger === 'mid_progress' && !state.encountersUsed.includes(e));
        } else if (state.tabsCollected === CONFIG.targetTabs + 1) {
            encounter = encounters.find(e => e.trigger === 'late_progress' && !state.encountersUsed.includes(e));
        } else if (Math.random() < 0.15) { 
            const pool = encounters.filter(e => e.trigger === 'random' && !state.encountersUsed.includes(e));
            if (pool.length > 0) encounter = pool[Math.floor(Math.random() * pool.length)];
        }

        if (encounter) {
            state.encountersUsed.push(encounter);
            const encDelay = delay + 1500 + (Math.random() * 1500);
            setTimeout(() => {
                if (!state.isRunning) return;
                let mOff = 0;
                encounter.messages.forEach((m) => {
                    if (m.s) {
                        setTimeout(() => { if(state.isRunning) { addMessage(encounter.character, m.s); state.behavior.lastMessageTime = Date.now(); }}, mOff);
                        mOff += 1200 + Math.random() * 1000;
                    }
                    if (m.p) {
                        setTimeout(() => { if(state.isRunning) { addMessage('player', m.p); state.behavior.lastMessageTime = Date.now(); }}, mOff);
                        mOff += 1200 + Math.random() * 1000;
                    }
                });
            }, encDelay);
        }
    }

    // 6. MAP & COLLISION SYSTEMS
    // ==========================================
    
    function isWalkable(x, y) {
        if (!state.collisionImageData) return true;

        if (x < 0 || y < 0 || x >= state.mapWidth || y >= state.mapHeight) {
            return false;
        }

        const normalizedX = x / state.mapWidth;
        const normalizedY = y / state.mapHeight;

        const maskX = Math.floor(normalizedX * state.collisionWidth);
        const maskY = Math.floor(normalizedY * state.collisionHeight);

        if (maskX < 0 || maskX >= state.collisionWidth || maskY < 0 || maskY >= state.collisionHeight) {
            return false;
        }

        const idx = (maskY * state.collisionWidth + maskX) * 4;
        const r = state.collisionImageData[idx];
        const g = state.collisionImageData[idx + 1];
        const b = state.collisionImageData[idx + 2];
        const brightness = (r + g + b) / 3;

        return brightness > 180;
    }

    function isWalkableRect(cx, cy, w, h) {
        const footW = CONFIG.playerDrawSize * 0.28;
        const footY = cy + (CONFIG.playerDrawSize * 0.32); // push down to actual feet

        return (
               isWalkable(cx, footY) &&
               isWalkable(cx - footW / 2, footY) &&
               isWalkable(cx + footW / 2, footY)
        );
    }

    function getWalkableSpot(minDistFromPlayer = 0) {
        for (let i = 0; i < 5000; i++) {
            let rx = 50 + Math.random() * (state.mapWidth - 100);
            let ry = 50 + Math.random() * (state.mapHeight - 100);
            // using the foot-based check internally, dummy width/height values
            if (isWalkableRect(rx, ry, 0, 0)) {
                if (minDistFromPlayer > 0 && Math.hypot(rx - state.player.x, ry - state.player.y) < minDistFromPlayer) continue;
                return {x: rx, y: ry};
            }
        }
        return {x: state.mapWidth/2, y: state.mapHeight/2}; 
    }

    function resetGame() {
        state.currentStory = STORY_PACKS[Math.floor(Math.random() * STORY_PACKS.length)];
        msgContainer.innerHTML = '';
        addMessage('smumsky', state.currentStory.intro[Math.floor(Math.random() * state.currentStory.intro.length)]);
        
        state.tabsCollected = 0;
        state.tripLevel = 0;
        state.encountersUsed = []; 

        updateTripState();
        
        state.behavior.lastTabTime = Date.now();
        state.behavior.lastMessageTime = Date.now();
        state.behavior.directionChanges = 0;
        state.behavior.visitedTiles = [];
        state.playerHit.active = false;
        state.playerHit.timer = 0;
        
        // Clean up ending animation states
        state.isEnding = false;
        state.endingTimer = 0;
        state.endingPhase = "none";
        state.lastGifElement = null;
        state.isEnteringRave = false;
        state.raveEnterTimer = 0;
        state.raveZoomTimer = 0;
        state.entryFlash = {
            active: false,
            timer: 0
        };
        
        const app = document.getElementById('app-container');
        app.style.transform = 'none';
        app.style.opacity = 1;
        
        const canvasWrap = document.getElementById('canvas-container');
        canvasWrap.style.transform = 'scale(1)';

        const flash = document.getElementById('white-flash');
        flash.style.opacity = 0;
        flash.classList.add('hidden');

        document.getElementById('win-title').style.opacity = 0;
        document.getElementById('btn-replay').style.opacity = 0;
        document.getElementById('btn-replay').style.pointerEvents = 'none';
        
        btnMute.classList.remove('hidden');

        // Spawn Player (try hardcoded central road area first, fallback to getWalkableSpot)
        let startX = state.mapWidth * 0.42;
        let startY = state.mapHeight * 0.53;
        if (!isWalkableRect(startX, startY, 0, 0)) {
            const fallback = getWalkableSpot();
            startX = fallback.x;
            startY = fallback.y;
        }
        state.player.x = startX;
        state.player.y = startY;
        state.player.direction = 'down';

        // Spawn Tabs with improved distribution
        state.entities.tabs = [];
        let attempts = 0;
        const maxAttempts = 3000;

        while (state.entities.tabs.length < CONFIG.totalTabsToSpawn && attempts < maxAttempts) {
            let rx = 50 + Math.random() * (state.mapWidth - 100);
            let ry = 50 + Math.random() * (state.mapHeight - 100);

            // Must be walkable
            if (!isWalkableRect(rx, ry, 0, 0)) {
                attempts++;
                continue;
            }

            // Enforce distance from other tabs to prevent clumping
            let tooClose = false;
            for (let t of state.entities.tabs) {
                if (Math.hypot(t.x - rx, t.y - ry) < CONFIG.minTabDistance) {
                    tooClose = true;
                    break;
                }
            }

            // Also keep tabs slightly away from the player's spawn point
            if (!tooClose && Math.hypot(state.player.x - rx, state.player.y - ry) < 150) {
                tooClose = true;
            }

            if (!tooClose) {
                state.entities.tabs.push({ x: rx, y: ry });
            }

            attempts++;
        }

        // Fallback: If we couldn't place them all due to map density, place the rest randomly
        while (state.entities.tabs.length < CONFIG.totalTabsToSpawn) {
            const fallbackSpot = getWalkableSpot(100);
            state.entities.tabs.push({ x: fallbackSpot.x, y: fallbackSpot.y });
        }

        // Spawn Doctor NPC
        const docSpawn = getWalkableSpot(200);
        state.entities.doctor = { x: docSpawn.x, y: docSpawn.y, encountered: false, punchTimer: 0 };
        
        state.entities.rave = null;
        initAudio();
        state.isRunning = true;
        resizeCanvas();
    }

    function spawnRaveTile() {
        state.entities.rave = getWalkableSpot(250);
    }

    function checkCollisions() {
        const px = state.player.x;
        const py = state.player.y;

        // Tabs
        for (let i = state.entities.tabs.length - 1; i >= 0; i--) {
            const t = state.entities.tabs[i];
            if (Math.hypot(px - t.x, py - t.y) < (CONFIG.playerDrawSize/2 + CONFIG.tabDrawSize/2)) {
                state.entities.tabs.splice(i, 1);
                state.tabsCollected++;
                state.behavior.lastTabTime = Date.now(); 

                updateTripState();

                state.tripDistortion.active = true;
                state.tripDistortion.timer = 25;
                state.tripDistortion.maxTime = 25;
                state.tripDistortion.targetAngle = (Math.random() - 0.5) * 8;
                state.tripDistortion.targetBlur = 1.2 + Math.random() * 1.5;

                triggerStoryBeat();
                if(state.tabsCollected === CONFIG.targetTabs) spawnRaveTile();
            }
        }

        // Doctor
        if (state.entities.doctor && !state.entities.doctor.encountered) {
            if (Math.hypot(px - state.entities.doctor.x, py - state.entities.doctor.y) < (CONFIG.playerDrawSize/2 + CONFIG.doctorDrawSize/2)) {
                state.entities.doctor.encountered = true;
                state.entities.doctor.punchTimer = 60; // 1 sec at 60fps
                state.tripDistortion.active = true;
                state.tripDistortion.timer = 20; // brief camera shake
                
                // Add red hit feedback
                state.playerHit.active = true;
                state.playerHit.timer = 20;
                
                triggerDoctorEncounter();
            }
        }

        // Rave
        if (state.entities.rave && Math.hypot(px - state.entities.rave.x, py - state.entities.rave.y) < CONFIG.playerDrawSize) {
            state.isRunning = false;
            state.isEnteringRave = true;
            state.raveEnterTimer = 0;
            state.raveZoomTimer = 0;
        }
    }

    function winGame() {
        state.isEnding = true;
        state.endingTimer = 0;
        state.endingPhase = "message";
    }

    function updateMovement() {
        let moveX = 0, moveY = 0;
        
        if (state.input.left) { moveX = -state.playerSpeed; state.player.direction = 'left'; }
        if (state.input.right) { moveX = state.playerSpeed; state.player.direction = 'right'; }
        if (state.input.up) { moveY = -state.playerSpeed; state.player.direction = 'up'; }
        if (state.input.down) { moveY = state.playerSpeed; state.player.direction = 'down'; }

        // Normalize diagonals
        if (moveX !== 0 && moveY !== 0) {
            moveX *= 0.707;
            moveY *= 0.707;
        }

        state.player.isMoving = (moveX !== 0 || moveY !== 0);

        if (state.player.isMoving) {
            const p = state.player;

            // Independent Axis Sliding using foot-based rect check
            if (isWalkableRect(p.x + moveX, p.y, 0, 0)) p.x += moveX;
            if (isWalkableRect(p.x, p.y + moveY, 0, 0)) p.y += moveY;

            // Behavior Trackers
            const gridKey = Math.floor(p.x / 50) + ',' + Math.floor(p.y / 50);
            if (state.behavior.visitedTiles.length === 0 || state.behavior.visitedTiles[state.behavior.visitedTiles.length - 1] !== gridKey) {
                state.behavior.visitedTiles.push(gridKey);
                if (state.behavior.visitedTiles.length > 15) state.behavior.visitedTiles.shift();
            }

            if (p.direction !== state.behavior.lastDirection) {
                state.behavior.directionChanges++;
                state.behavior.lastDirection = p.direction;
            }

            checkCollisions();
        }
    }

    // ==========================================
    // 7. RENDERING SYSTEM
    // ==========================================
    
    function resizeCanvas() {
        const rect = canvasContainer.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        state.zoom = 1.05; // 5% scale boost
    }

    function render() {
        ctx.fillStyle = CONFIG.colors.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.imageSmoothingEnabled = false;

        // Base Camera Transform
        ctx.save();
        state.camera.x = Math.floor(canvas.width / 2) - state.player.x * state.zoom;
        state.camera.y = Math.floor(canvas.height / 2) - state.player.y * state.zoom;
        
        ctx.translate(state.camera.x, state.camera.y);
        ctx.scale(state.zoom, state.zoom);

        // Apply any active shake
        let shakeX = 0, shakeY = 0;
        if (state.entities.doctor && state.entities.doctor.punchTimer > 0) {
            shakeX = (Math.random() - 0.5) * 10;
            shakeY = (Math.random() - 0.5) * 10;
        }
        
        if (shakeX !== 0 || shakeY !== 0) {
            ctx.translate(shakeX, shakeY);
        }

        // 1. Draw Static Map Image
        if (assets.mapImg) {
            ctx.drawImage(assets.mapImg, 0, 0, state.mapWidth, state.mapHeight);
            
            // Draw collision mask overlay for debugging
            if (CONFIG.debugCollision && assets.collisionImg) {
                ctx.save();
                ctx.globalAlpha = 0.30;
                ctx.drawImage(assets.collisionImg, 0, 0, state.mapWidth, state.mapHeight);
                ctx.restore();
            }
        } else {
            // Failsafe background pattern
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, state.mapWidth, state.mapHeight);
        }

        // 2. Draw Tabs
        const pulseScale = 1 + (Math.sin(Date.now() / 150) * 0.15);
        const pulseSize = Math.sin(Date.now() / 150) * 2;
        
        state.entities.tabs.forEach(tab => {
            ctx.save();
            ctx.translate(tab.x, tab.y);
            ctx.scale(pulseScale, pulseScale);
            const ts = CONFIG.tabDrawSize;
            if (assets.tabImg) {
                ctx.drawImage(assets.tabImg, -ts/2, -ts/2, ts, ts);
            } else {
                ctx.fillStyle = CONFIG.colors.tab;
                ctx.beginPath();
                ctx.ellipse(0, 0, (ts/4) + pulseSize/2, (ts/2) + pulseSize, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });

        // 3. Draw Doctor
        if (state.entities.doctor) {
            const doc = state.entities.doctor;
            if (doc.punchTimer > 0) doc.punchTimer--;
            let dSpr = doc.punchTimer > 0 ? assets.sprDocPunch : assets.sprDocIdle;
            const ds = CONFIG.doctorDrawSize;
            
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 4;
            
            if (dSpr) {
                ctx.drawImage(dSpr, doc.x - ds/2, doc.y - ds/2, ds, ds);
            } else {
                ctx.fillStyle = 'purple';
                ctx.fillRect(doc.x - ds/4, doc.y - ds/4, ds/2, ds/2);
            }
            ctx.restore();
        }

        // 4. Draw Rave Tile
        if (state.entities.rave) {
            const rx = state.entities.rave.x;
            const ry = state.entities.rave.y;
            
            const raveColors = [
                "#1B00FF", // neon blue
                "#5A00FF", // deep purple
                "#9D00FF", // magenta-purple
                "#FF00FF"  // magenta
            ];

            const colorIndex = Math.floor(Date.now() / 200) % raveColors.length;
            ctx.fillStyle = raveColors[colorIndex];
            
            ctx.shadowBlur = 20 + Math.sin(state.audio.beatPhase * Math.PI) * 10;
            ctx.shadowColor = ctx.fillStyle;
            const rs = CONFIG.playerDrawSize;
            ctx.fillRect(rx - rs/2, ry - rs/2, rs, rs);
            ctx.shadowBlur = 0;
        }

        // 5. Draw Player
        const pSize = CONFIG.playerDrawSize; 
        const bounce = Math.sin(state.audio.beatPhase * Math.PI) * -4;
        const pyOffset = state.tripLevel > 0 ? bounce : 0;

        let gx = 0, gy = 0;
        const isGlitching = state.playerGlitch && state.playerGlitch.active;
        if (isGlitching) {
            gx = state.playerGlitch.offsetX;
            gy = state.playerGlitch.offsetY;
        }

        let pSpr = assets.sprStand;
        if (state.player.isMoving) {
            if (state.player.direction === 'up') pSpr = assets.sprWalkUp || assets.sprStand;
            else if (state.player.direction === 'down') pSpr = assets.sprWalkDown || assets.sprStand;
            else if (state.player.direction === 'left' || state.player.direction === 'right') {
                pSpr = Math.floor(Date.now() / 150) % 2 === 0 ? assets.sprWalkSide1 : assets.sprWalkSide2;
                if (!pSpr) pSpr = assets.sprStand;
            }
        }
        if (!pSpr) pSpr = assets.playerImg;

        ctx.save();

        ctx.translate(state.player.x + gx, state.player.y + pyOffset + gy);
        
        if (state.player.direction === 'left') {
            ctx.scale(-1, 1);
        }

        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 4;

        if (pSpr) {
            if (isGlitching && state.playerGlitch.rgbSplit) {
                ctx.globalAlpha = 0.6;
                ctx.drawImage(pSpr, -pSize/2 - 4, -pSize/2, pSize, pSize);
                ctx.drawImage(pSpr, -pSize/2 + 4, -pSize/2, pSize, pSize);
                ctx.globalAlpha = 1.0;
            }
            ctx.drawImage(pSpr, -pSize/2, -pSize/2, pSize, pSize);
            
            // Hit feedback overlay (Silhouette tint)
            if (state.playerHit && state.playerHit.active && Math.floor(state.playerHit.timer / 4) % 2 === 0) {
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width = pSize;
                tmpCanvas.height = pSize;
                const tCtx = tmpCanvas.getContext('2d');
                
                tCtx.drawImage(pSpr, 0, 0, pSize, pSize);
                tCtx.globalCompositeOperation = "source-atop";
                tCtx.fillStyle = "rgba(255, 0, 0, 0.7)";
                tCtx.fillRect(0, 0, pSize, pSize);
                
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                ctx.globalCompositeOperation = "lighter";
                ctx.drawImage(tmpCanvas, -pSize/2, -pSize/2, pSize, pSize);
                ctx.restore();
            }

            if (state.tripLevel > 2) {
                ctx.globalAlpha = 0.15;
                ctx.drawImage(pSpr, -pSize/2 - 8, -pSize/2, pSize, pSize);
                ctx.globalAlpha = 1.0;
            }
        } else {
            ctx.fillStyle = '#fff';
            ctx.fillRect(-16, -16, 32, 32);
        }

        ctx.restore();
        ctx.restore(); // Camera restore
    }

    // ==========================================
    // 8. MAIN GAME LOOP
    // ==========================================
    
    function gameLoop() {
        if (state.isRunning) {
            updateMovement();
            
            if (state.playerHit && state.playerHit.active) {
                state.playerHit.timer--;
                if (state.playerHit.timer <= 0) {
                    state.playerHit.active = false;
                }
            }
        }

        if (state.isEnteringRave) {
            state.raveEnterTimer++;

            const rave = state.entities.rave;
            const dx = rave.x - state.player.x;
            const dy = rave.y - state.player.y;

            // smooth pull into rave
            state.player.x += dx * 0.08;
            state.player.y += dy * 0.08;

            // subtle visual feedback
            const pulse = Math.sin(state.raveEnterTimer * 0.3);
            canvas.style.setProperty('--beat-scale', 1 + pulse * 0.08);
            canvas.style.setProperty('--trip-blur', `${Math.abs(pulse) * 3}px`);

            if (state.raveEnterTimer >= 60) {
                state.isEnteringRave = false;
                winGame();
            }
        }

        if (state.isRunning || state.isEnding || state.isEnteringRave) {
            updateBeatSync();
        }

        if (state.entryFlash.active) {
            const flash = document.getElementById('white-flash');
            flash.classList.remove('hidden');

            const alpha = state.entryFlash.timer / 18;
            flash.style.opacity = alpha;

            state.entryFlash.timer--;

            if (state.entryFlash.timer <= 0) {
                state.entryFlash.active = false;
                flash.style.opacity = 0;
                flash.classList.add('hidden');
            }
        }

        if (state.isEnding) {
            state.endingTimer++;
            
            // PHASE 1 — FINAL TEXT FIRST
            if (state.endingPhase === "message") {
                if (state.endingTimer === 1) {
                    addMessage('player', state.currentStory.ending.player);
                }

                if (state.endingTimer > 60) {
                    state.endingPhase = "holdText";
                    state.endingTimer = 0;
                }
            }

            // PHASE 2 — LET TEXT BREATHE
            else if (state.endingPhase === "holdText") {
                if (state.endingTimer > 45) {
                    state.endingPhase = "canvasPush";
                    state.endingTimer = 0;
                }
            }

            // PHASE 3 — CANVAS ONLY PUSH-IN
            else if (state.endingPhase === "canvasPush") {
                const t = Math.min(1, state.endingTimer / 60);
                const eased = t * t * t;

                const canvasWrap = document.getElementById('canvas-container');
                canvasWrap.style.transform = `scale(${1 + eased * 0.35})`;

                if (state.endingTimer >= 60) {
                    state.entryFlash.active = true;
                    state.entryFlash.timer = 18;

                    state.endingPhase = "flash";
                    state.endingTimer = 0;
                }
            }

            // PHASE 4 — WHITE / BLUE FLASH
            else if (state.endingPhase === "flash") {
                if (state.endingTimer > 18) {
                    state.endingPhase = "fullscreen";
                    state.endingTimer = 0;
                }
            }

            // PHASE 5 — FULLSCREEN GIF
            else if (state.endingPhase === "fullscreen") {
                if (state.endingTimer === 1) {
                    // hide game instantly
                    document.getElementById('app-container').style.opacity = 0;

                    const winScreen = document.getElementById('win-screen');
                    const winGif = document.getElementById('win-gif');

                    winGif.src = assets.dizzyDance ? assets.dizzyDance.src : 'DIZZY_DANCE.gif';
                    winScreen.classList.remove('hidden');
                }

                // text fade in
                if (state.endingTimer === 60) {
                    document.getElementById('win-title').style.opacity = 1;
                }

                // button fade in
                if (state.endingTimer === 120) {
                    const btn = document.getElementById('btn-replay');
                    btn.style.opacity = 1;
                    btn.style.pointerEvents = 'auto';
                }
            }
        }

        let intensity = state.tripLevel / (CONFIG.tripStates.length - 1);

        if (state.isEnding) {
            intensity *= 0.6; // keep effect alive but controlled
        }

        if ((state.isRunning || state.isEnding || state.isEnteringRave) && state.tripLevel > 2) {
            if (!state.tripDistortion.active && state.audio.isNewBeat) {
                let triggered = false;
                let accentMultiplier = 1;

                if (state.audio.currentBeatCount % 4 === 0 && Math.random() < (0.6 * intensity)) {
                    triggered = true;
                    accentMultiplier = 1.5; 
                } 
                else if (state.audio.currentBeatCount % 2 === 0 && Math.random() < (0.4 * intensity)) {
                    triggered = true;
                }

                if (triggered) {
                    state.tripDistortion.active = true;
                    state.tripDistortion.maxTime = Math.floor(30 + Math.random() * 20);
                    state.tripDistortion.timer = state.tripDistortion.maxTime;
                    
                    state.tripDistortion.targetAngle = (Math.random() - 0.5) * 5 * intensity * accentMultiplier;
                    state.tripDistortion.targetBlur = (0.8 + Math.random() * 0.8) * intensity * accentMultiplier;
                }
            }

            if (state.tripDistortion.active) {
                state.tripDistortion.timer--;
                const progress = 1 - (state.tripDistortion.timer / state.tripDistortion.maxTime);
                const ease = Math.sin(progress * Math.PI);
                
                state.tripDistortion.currentAngle = state.tripDistortion.targetAngle * ease;
                state.tripDistortion.currentBlur = state.tripDistortion.targetBlur * ease;

                if (state.tripDistortion.timer <= 0) {
                    state.tripDistortion.active = false;
                    state.tripDistortion.currentAngle = 0;
                    state.tripDistortion.currentBlur = 0;
                }
            }
        } else if (state.tripDistortion.active || state.tripLevel <= 2) {
             state.tripDistortion.active = false;
             state.tripDistortion.currentAngle = 0;
             state.tripDistortion.currentBlur = 0;
        }

        canvas.style.setProperty('--trip-rotate', `${state.tripDistortion.currentAngle}deg`);
        canvas.style.setProperty('--trip-blur', `${state.tripDistortion.currentBlur}px`);

        if ((state.isRunning || state.isEnding || state.isEnteringRave) && state.tripLevel > 0) {
            if (!state.playerGlitch.active && state.audio.isNewHalfBeat) {
                const chance = state.audio.isNewBeat ? 0.18 : 0.06;
                if (Math.random() < (chance * intensity)) {
                    state.playerGlitch.active = true;
                    state.playerGlitch.timer = Math.floor(2 + Math.random() * 3); 
                    state.playerGlitch.offsetX = (Math.random() - 0.5) * 10 * intensity;
                    state.playerGlitch.offsetY = (Math.random() - 0.5) * 4 * intensity;
                    state.playerGlitch.rgbSplit = Math.random() > 0.3;
                }
            }

            if (state.playerGlitch.active) {
                state.playerGlitch.timer--;
                if (state.playerGlitch.timer <= 0) {
                    state.playerGlitch.active = false;
                    state.playerGlitch.offsetX = 0;
                    state.playerGlitch.offsetY = 0;
                }
            }
        } else if (state.playerGlitch && state.playerGlitch.active) {
             state.playerGlitch.active = false;
             state.playerGlitch.offsetX = 0;
             state.playerGlitch.offsetY = 0;
        }

        if (state.isRunning && state.tripLevel < CONFIG.tripStates.length - 1) {
            const now = Date.now();
            if (now - state.behavior.lastMessageTime > 10000) {
                state.behavior.checkTimer++;
                if (state.behavior.checkTimer > 360) {
                    state.behavior.checkTimer = 0;
                    let behaviorMsg = null;
                    const behaviors = state.currentStory.behaviors;
                    
                    if (state.behavior.directionChanges > 8) {
                        const msgs = behaviors.hesitating;
                        behaviorMsg = msgs[Math.floor(Math.random() * msgs.length)];
                        if (state.tripLevel > 3 && Math.random() > 0.5) behaviorMsg = behaviorMsg.toUpperCase();
                    } 
                    else if (state.behavior.visitedTiles.length >= 15 && new Set(state.behavior.visitedTiles).size < 8) {
                        const msgs = behaviors.looping;
                        behaviorMsg = msgs[Math.floor(Math.random() * msgs.length)];
                        if (state.tripLevel > 3 && Math.random() > 0.5) behaviorMsg = behaviorMsg.toUpperCase();
                    }
                    else if (now - state.behavior.lastTabTime > 25000) {
                        const msgs = behaviors.lost;
                        behaviorMsg = msgs[Math.floor(Math.random() * msgs.length)];
                        if (state.tripLevel > 3 && Math.random() > 0.5) behaviorMsg = behaviorMsg.toUpperCase();
                    }

                    if (behaviorMsg) {
                        let delay = 800 + Math.random() * 1000;
                        if (state.tripLevel > 3) delay = 400 + Math.random() * 1400;
                        setTimeout(() => {
                            if(state.isRunning) {
                                addMessage('smumsky', behaviorMsg);
                                state.behavior.lastMessageTime = Date.now(); 
                            }
                        }, delay);
                        state.behavior.lastMessageTime = now;
                        state.behavior.directionChanges = 0;
                        state.behavior.visitedTiles = [];
                    }
                }
            }
        }

        if ((state.isRunning || state.isEnding || state.isEnteringRave) && state.tripLevel > 2) {
            if (!state.uiGlitch.batteryActive && Math.random() < (0.001 * intensity)) {
                state.uiGlitch.batteryActive = true;
                const batEl = document.getElementById('battery-text');
                const origText = batEl.innerText;
                const jitter = Math.floor(Math.random() * 10 - 5);
                batEl.innerText = `${84 + jitter}%`;
                setTimeout(() => {
                    batEl.innerText = origText;
                    state.uiGlitch.batteryActive = false;
                }, 100 + Math.random() * 200);
            }

            if (!state.uiGlitch.textActive && Math.random() < (0.003 * intensity)) {
                state.uiGlitch.textActive = true;
                const npEl = document.getElementById('now-playing-text');
                const npContainer = document.getElementById('now-playing-container');
                const variations = [
                    "Nothing Wrrong - Take Your Medicine",
                    "Nothing Wron g - Take Your Medicine",
                    "Nothin g Wrong - Take Your Medicine",
                    "Nothing Wrong - Take Your Meds",
                    "N0thing Wrong - Take Your Medicine"
                ];
                npEl.innerText = variations[Math.floor(Math.random() * variations.length)];
                npContainer.classList.add('glitch-ui');
                setTimeout(() => {
                    npEl.innerText = "Nothing Wrong - Take Your Medicine";
                    npContainer.classList.remove('glitch-ui');
                    state.uiGlitch.textActive = false;
                }, 150 + Math.random() * 200);
            }
        }

        // Micro-polish: subtle flicker on intro text at higher trip levels
        const introOverlay = document.getElementById('intro-overlay');
        if ((state.isRunning || state.isEnding || state.isEnteringRave) && !introOverlay.classList.contains('hidden') && state.tripLevel > 2) {
            const introText = document.getElementById('intro-text');
            if (introText) introText.style.opacity = 0.85 + Math.random() * 0.15;
        }

        render();
        requestAnimationFrame(gameLoop);
    }

    // ==========================================
    // 9. INPUT HANDLING
    // ==========================================
    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp' || e.key === 'w') state.input.up = true;
        if(e.key === 'ArrowDown' || e.key === 's') state.input.down = true;
        if(e.key === 'ArrowLeft' || e.key === 'a') state.input.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd') state.input.right = true;
    });

    window.addEventListener('keyup', (e) => {
        if(e.key === 'ArrowUp' || e.key === 'w') state.input.up = false;
        if(e.key === 'ArrowDown' || e.key === 's') state.input.down = false;
        if(e.key === 'ArrowLeft' || e.key === 'a') state.input.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd') state.input.right = false;
    });

    window.addEventListener('resize', resizeCanvas);

    // ==========================================
    // 10. INITIALIZATION
    // ==========================================
    document.getElementById('btn-start').addEventListener('click', () => {
        document.getElementById('start-screen').classList.add('hidden');
        
        const app = document.getElementById('app-container');
        app.style.opacity = 1;
        app.style.pointerEvents = 'auto';

        const intro = document.getElementById('intro-overlay');
        intro.classList.remove('hidden');

        btnMute.classList.remove('hidden');

        setTimeout(() => {
            intro.style.opacity = 0;
            setTimeout(() => {
                intro.classList.add('hidden');
                intro.style.opacity = 1;
            }, 500);
        }, 2500);
        
        resetGame();
    });

    document.getElementById('btn-replay').addEventListener('click', () => {
        document.getElementById('win-screen').classList.add('hidden');
        resetGame();
    });

    if (!document.getElementById('btn-mute').dataset.bound) {
        document.getElementById('btn-mute').addEventListener('click', () => {
            state.audio.isMuted = !state.audio.isMuted;
            if (state.audio.element) {
                state.audio.element.muted = state.audio.isMuted;
            }
            document.getElementById('btn-mute').innerText = state.audio.isMuted ? "SOUND OFF" : "SOUND ON";
        });
        document.getElementById('btn-mute').dataset.bound = "true";
    }

    await loadAssets();
    
    if (assets.homescreenImg) {
        document.getElementById('start-screen').style.backgroundImage = `url('${assets.homescreenImg.src}')`;
    }

    if (assets.startBtnImg) {
        document.getElementById('start-btn-img').src = assets.startBtnImg.src;
    }
    
    resizeCanvas();
    render(); 
    requestAnimationFrame(gameLoop); 

})();
</script>
